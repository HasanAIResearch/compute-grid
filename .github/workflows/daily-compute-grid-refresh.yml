name: Daily Compute Grid Refresh

on:
  schedule:
    - cron: "35 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install market data dependency
        run: python -m pip install --upgrade yfinance

      - name: Refresh Compute Grid daily pulse
        run: python scripts/update_compute_grid_daily.py

      - name: Commit daily refresh if changed
        run: |
          if git diff --quiet; then
            echo "No Compute Grid changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Daily Compute Grid refresh"
          git push
